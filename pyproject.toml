[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [".venv"]

[tool.ruff.lint]
# PEP 8 (E/W), pyflakes (F), isort (I), pep8-naming (N), pyupgrade (UP), bugbear (B).
select = ["E", "W", "F", "I", "N", "UP", "B"]
ignore = [
    "E501",  # line length handled case-by-case; some SQL/report lines run long
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["N802", "N806"]  # test helpers use non-PEP8 names freely

[tool.coverage.run]
branch = true
omit = ["tests/*", ".venv/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",   # CLI entry points, exercised via main()/functions
]

[tool.mypy]
python_version = "3.10"
# Unstubbed third-party deps (psycopg2, flask_login, flask_wtf, bcrypt, dotenv).
ignore_missing_imports = true
warn_unused_ignores = false
# Full --strict is applied on the CLI; this section documents the baseline config.
exclude = ['\.venv']
