<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SOC Dashboard{% endblock %}</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
  <style>
    body { background:#0b0f17; }
    .stat-card .display-6 { font-weight:700; }
    .chart-box { position:relative; height:320px; }
    .table-dark td, .table-dark th { vertical-align:middle; }
    .sev-badge { font-weight:600; letter-spacing:.3px; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-dark border-bottom border-secondary">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-danger" href="/">
        🛡️ SOC Dashboard
      </a>
      <div class="navbar-nav">
        <a class="nav-link {% block nav_dashboard %}{% endblock %}" href="/">Dashboard</a>
        <a class="nav-link {% block nav_analyst %}{% endblock %}" href="/analyst">Analyst Performance</a>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
