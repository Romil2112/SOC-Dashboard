<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · SOC Dashboard</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous">
  <style>
    body { background:#0b0f17; min-height:100vh; }
    .login-card { max-width:380px; margin:8vh auto 0; }
  </style>
</head>
<body>
  <main class="container">
    <div class="login-card">
      <div class="text-center mb-4">
        <div class="fs-3 fw-bold text-danger">🛡️ SOC Dashboard</div>
        <div class="text-secondary small">Analyst sign-in · internal use only</div>
      </div>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="alert alert-danger py-2" role="alert">
            {{ messages[0] }}
          </div>
        {% endif %}
      {% endwith %}

      <form method="post" action="{{ url_for('login') }}" class="card bg-dark border-secondary p-4">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" class="form-control" id="username" name="username"
                 autocomplete="username" autofocus required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password"
                 autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-danger w-100">Sign in</button>
      </form>
    </div>
  </main>
</body>
</html>
